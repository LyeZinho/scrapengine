version: '3.8'

services:
  node:
    build:
      context: ./node
      dockerfile: Dockerfile
    container_name: scrapengine-node
    ports:
      - "${NODE_PORT:-7650}:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DATABASE_URL=postgresql://scrapengine:${DB_PASSWORD:-scrap123}@postgres:5432/scrapengine
      - REDIS_URL=redis://redis:6379
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - ADMIN_API_KEY=${ADMIN_API_KEY}
      - DEFAULT_RATE_LIMIT=${DEFAULT_RATE_LIMIT:-60}
      - WEBHOOK_TIMEOUT_MS=${WEBHOOK_TIMEOUT_MS:-5000}
      - WEBHOOK_MAX_RETRIES=${WEBHOOK_MAX_RETRIES:-3}
      - SCRAPE_TIMEOUT=${SCRAPE_TIMEOUT:-60000}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: scrapengine-redis
    ports:
      - "${REDIS_PORT:-7653}:6379"
    volumes:
      - redis-data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres:
    image: postgres:15-alpine
    container_name: scrapengine-postgres
    ports:
      - "${POSTGRES_PORT:-5434}:5432"
    environment:
      - POSTGRES_DB=scrapengine
      - POSTGRES_USER=scrapengine
      - POSTGRES_PASSWORD=${DB_PASSWORD:-scrap123}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U scrapengine"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  redis-data:
  postgres-data:

