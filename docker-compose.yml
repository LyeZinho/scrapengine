services:
  node:
    build:
      context: ./node
      dockerfile: Dockerfile
    container_name: scrapengine-node
    ports:
      - "${NODE_PORT:-3000}:3000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://scrapengine:${DB_PASSWORD:-scrap123}@postgres:5432/scrapengine
      - REDIS_URL=redis://redis:6379
    depends_on:
      - postgres
      - redis
    restart: unless-stopped

  # Redis for BullMQ
  redis:
    image: redis:7-alpine
    container_name: scrapengine-redis
    ports:
      - "${REDIS_PORT:-7653}:6379"
    volumes:
      - redis-data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: scrapengine-postgres
    ports:
      - "${POSTGRES_PORT:-5434}:5432"
    environment:
      - POSTGRES_DB=scrapengine
      - POSTGRES_USER=scrapengine
      - POSTGRES_PASSWORD=${DB_PASSWORD:-scrap123}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U scrapengine"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  redis-data:
  postgres-data:
